name: Build and deploy Node.js app to Azure Web App - reportmigration-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # If your build dir is not "build", change it here and below.
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          # Change "build" to your actual build output dir (e.g., dist)
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
          path: ./build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'reportmigration-frontend'
          slot-name: 'Production'
          # Deploy only the build output
          package: ./build
          # Replace this with your actual secret name; ensure no extra characters
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_528CAE15E90D455F8401AC0D787FDA6D }}
``
